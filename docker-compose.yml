services:
  db:
    image: postgres:14
    container_name: bitsealer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bitsealer-internal

  stamper:
    build:
      context: ./bitsealer-stamper
      dockerfile: Dockerfile
    container_name: bitsealer-stamper
    restart: unless-stopped
    environment:
      OTS_CALENDARS: https://alice.btc.calendar.opentimestamps.org,https://bob.btc.calendar.opentimestamps.org
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bitsealer-internal

  backend:
    build:
      context: ./bitsealer-backend
      dockerfile: Dockerfile
    container_name: bitsealer-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      stamper:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      STAMPER_BASE_URL: http://stamper:8000
      STAMPER_CALLBACK_TOKEN: ${STAMPER_CALLBACK_TOKEN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    networks:
      - bitsealer-internal

  frontend:
    build:
      context: ./bitsealer-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: bitsealer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - bitsealer-internal

  edge-proxy:
    image: nginx:1.27-alpine
    container_name: bitsealer-edge-proxy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./edge-nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bitsealer-internal

volumes:
  postgres_data:

networks:
  bitsealer-internal:
    driver: bridge