# Zonas de rate limiting por IP real del cliente
# binary_remote_addr = IP del cliente en formato compacto
# rate=5r/m  => 5 peticiones por minuto
# rate=3r/m  => 3 peticiones por minuto
# rate=10r/m => 10 peticiones por minuto

limit_req_zone $binary_remote_addr zone=auth_login_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_register_zone:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=file_upload_zone:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Si se supera el límite, devolver 429
    limit_req_status 429;

    # LOGIN
    location = /api/auth/login {
        limit_req zone=auth_login_zone burst=10 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REGISTER
    location = /api/auth/register {
        limit_req zone=auth_register_zone burst=5 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # UPLOAD
    location = /api/files/upload {
        limit_req zone=file_upload_zone burst=20 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Resto de API sin rate limit específico
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Front SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}